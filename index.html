<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BDT Codex Projects 2026</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090d14;
        --panel: #121923;
        --line: #283647;
        --text: #f4f7fb;
        --muted: #9aa9bb;
        --accent: #29b6f6;
        --accent-2: #f4c542;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 22% 0%, rgba(41, 182, 246, 0.16), transparent 28%), var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1080px, 100%);
        margin: 0 auto;
        padding: clamp(28px, 6vw, 72px) clamp(18px, 4vw, 40px);
      }

      header {
        max-width: 760px;
        margin-bottom: 34px;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 6vw, 5rem);
        line-height: 0.95;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent-2);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }

      .project {
        min-height: 190px;
        display: grid;
        align-content: space-between;
        gap: 18px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(23, 34, 49, 0.96), rgba(14, 20, 29, 0.98));
        text-decoration: none;
      }

      .project h2 {
        margin: 0 0 8px;
        color: var(--text);
      }

      .project span {
        color: var(--accent);
        font-weight: 700;
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Project Index</p>
        <h1>BDT Codex Projects 2026</h1>
        <p>Each project lives after the repo URL as its own named path.</p>
      </header>

      <section class="grid" aria-label="Projects">
        <a class="project" href="./Sharktank/">
          <div>
            <h2>Shark Tank Intelligence Platform</h2>
            <p>Investor intelligence dashboard with Shark KPIs, rankings, company explorer, and data quality audits.</p>
          </div>
          <span>Open /Sharktank/</span>
        </a>
      </section>
    </main>
  </body>
</html>
